{% extends 'base.html' %}

{% block content %}

<h1 class="h3 mb-4 text-gray-900">
    <i class="fas fa-tachometer-alt mr-2"></i>
    Tableau de bord
</h1>

<div class="row">

    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-primary shadow h-100 py-2">
            <div class="card-body">
                <h5>Groupes</h5>
                <p>Gérer vos groupes</p>
                <div class="col-auto">
                    <i class="fas fa-layer-group fa-2x text-gray-300"></i>
                </div>
            </div>
    </div>
    </div>
        <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-primary shadow h-100 py-2">
            <div class="card-body">
                <h5>Total membres : {{ membres }}</h5>
                <p>Gérer vos membres</p>
                <div class="col-auto">
                    <i class="fas fa-users fa-2x text-gray-300"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-success shadow h-100 py-2">
            <div class="card-body">
                <h5>Tours</h5>
                <p>Gérer les tours</p>
                <div class="col-auto">
                    <i class="fas fa-sync-alt fa-2x text-gray-300"></i>
                </div>
            </div>
        </div>
    </div>

    <div class="col-xl-3 col-md-6 mb-4">
        <div class="card border-left-success shadow h-100 py-2">
            <div class="card-body">
                <h5>Cotisations</h5>
                <p>Suivre les paiements</p>
                <div class="col-auto">
                    <i class="fas fa-coins fa-2x text-gray-300"></i>
                </div>
            </div>
        </div>
    </div>

</div>

{% endblock %}
