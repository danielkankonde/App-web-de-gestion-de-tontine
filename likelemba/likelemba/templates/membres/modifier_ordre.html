{% extends 'base.html' %}
{% block content %}

<div class="card shadow">
    <div class="card-header">
        <h4>Modifier ordre</h4>
    </div>

    <div class="card-body">

        <p>
            Membre : <strong>{{ membre.nom_affiche }}</strong>
        </p>

        <form method="POST">
            {% csrf_token %}

            <div class="form-group">
                {{ form.ordre_reception.label_tag }}
                {{ form.ordre_reception }}

                {% if form.ordre_reception.errors %}
                    <div class="text-danger">
                        {{ form.ordre_reception.errors }}
                    </div>
                {% endif %}
            </div>

            <button class="btn btn-primary">
                Modifier
            </button>

            <a href="{% url 'liste_membres'  %}" class="btn btn-secondary">
                Annuler
            </a>

        </form>

    </div>
</div>

{% endblock %}
